<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASCII Camera</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="bg-glow" aria-hidden="true"></div>

  <main class="app-shell">
    <div class="hud hud-tl">
      <span id="statusText" class="hud-pill" data-type="ok">Ready</span>
    </div>

    <section class="stage-wrap">
      <canvas id="asciiCanvas" class="ascii-canvas" aria-label="Live ASCII camera output"></canvas>
    </section>

    <nav class="bottom-bar" aria-label="Camera actions">
      <button id="settingsBtn" class="icon-btn" type="button" aria-label="Open settings" aria-expanded="false">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19.14 12.94c.04-.31.06-.63.06-.94s-.02-.63-.06-.94l2.03-1.58a.5.5 0 0 0 .12-.63l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.25 7.25 0 0 0-1.63-.94l-.36-2.54a.5.5 0 0 0-.5-.43h-3.84a.5.5 0 0 0-.5.43l-.36 2.54c-.58.24-1.13.54-1.63.94l-2.39-.96a.5.5 0 0 0-.6.22L2.7 8.85a.5.5 0 0 0 .12.63l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94L2.82 14.52a.5.5 0 0 0-.12.63l1.92 3.32a.5.5 0 0 0 .6.22l2.39-.96c.5.4 1.05.7 1.63.94l.36 2.54a.5.5 0 0 0 .5.43h3.84a.5.5 0 0 0 .5-.43l.36-2.54c.58-.24 1.13-.54 1.63-.94l2.39.96a.5.5 0 0 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.63l-2.03-1.58ZM12 15.5A3.5 3.5 0 1 1 12 8a3.5 3.5 0 0 1 0 7.5Z"/></svg>
      </button>

      <button id="captureBtn" class="icon-btn" type="button" aria-label="Download PNG" disabled>
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3a1 1 0 0 1 1 1v8.59l2.3-2.3a1 1 0 1 1 1.4 1.42l-4.01 4a1 1 0 0 1-1.38 0l-4.01-4a1 1 0 0 1 1.4-1.42L11 12.59V4a1 1 0 0 1 1-1Zm-7 14a1 1 0 0 1 1 1v1h12v-1a1 1 0 1 1 2 0v2a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1v-2a1 1 0 0 1 1-1Z"/></svg>
      </button>
    </nav>

    <aside id="settingsPanel" class="settings-panel" aria-label="ASCII settings" hidden>
      <p id="controlsHelp" class="sr-only">Use arrow keys on sliders for precise adjustments. Camera output updates in real time.</p>

      <div class="control-group">
        <label for="densityRange">Density <output id="densityValue" aria-live="polite">90</output></label>
        <input id="densityRange" type="range" min="0" max="100" value="90" aria-valuemin="0" aria-valuemax="100" aria-valuenow="90" aria-label="Density">
      </div>

      <div class="control-group">
        <label for="quantityRange">Quantity <output id="quantityValue" aria-live="polite">88</output></label>
        <input id="quantityRange" type="range" min="20" max="100" value="88" aria-valuemin="20" aria-valuemax="100" aria-valuenow="88" aria-label="Quantity">
      </div>

      <div class="control-group">
        <label for="noiseRange">Noise <output id="noiseValue" aria-live="polite">4</output></label>
        <input id="noiseRange" type="range" min="0" max="100" value="4" aria-valuemin="0" aria-valuemax="100" aria-valuenow="4" aria-label="Noise">
      </div>

      <div class="control-group">
        <label for="textureSelect">Texture</label>
        <select id="textureSelect">
          <option value="linear">Linear</option>
          <option value="stipple">Stipple</option>
          <option value="risograph">Risograph</option>
          <option value="cyanotype">Cyanotype</option>
          <option value="thermal">Thermal</option>
          <option value="infrared">Infrared</option>
        </select>
      </div>

      <div class="control-group">
        <label for="colorModeSelect">Color Mode</label>
        <select id="colorModeSelect">
          <option value="mono">Mono Tint</option>
          <option value="rgb">Source RGB</option>
        </select>
      </div>

      <div class="control-group">
        <label for="tintPicker">Tint</label>
        <input id="tintPicker" type="color" value="#39FF14">
      </div>
    </aside>
  </main>

  <video id="cameraVideo" autoplay playsinline muted></video>
  <canvas id="sampleCanvas" hidden></canvas>

  <script type="module" src="./app.js"></script>
</body>
</html>
